<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brisbane Ward -- Missionary Meal Roster</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body>

<header>
  <div>
    <h1>Missionary Meal Roster</h1>
    <p>Click any day to make an event</p>
  </div>
</header>

<main>
  <div class="type-toggle">
    <button id="toggleElders"  class="toggle-btn active-elders"  onclick="setType('elders')">Elders</button>
    <button id="toggleSisters" class="toggle-btn"                onclick="setType('sisters')">Sisters</button>
  </div>
  <div id="calendar"></div>
</main>

<!-- Sign-up modal -->
<div class="modal-backdrop" id="signupModal">
  <div class="modal">
    <h2 id="signupModalTitle">Sign up to bring a meal</h2>
    <form id="signupForm" onsubmit="submitSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label>First name *</label>
          <input type="text" id="f_name" required />
        </div>
        <div class="form-group">
          <label>Last name *</label>
          <input type="text" id="l_name" required />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0.75rem">
        <label>Phone number *</label>
        <input type="tel" id="phone_num" placeholder="e.g. 0412 345 678" pattern="^\+?[\d\s\-\(\)]{7,12}$" title="7–12 digits, spaces, hyphens, or parentheses" required />
      </div>
      <div class="form-group">
        <label>Notes for the missionaries (Optional)</label>
        <textarea id="description" maxlength="200"></textarea>
      </div>
      <div id="signupError" class="error-msg" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('signupModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Sign me up</button>
      </div>
    </form>
  </div>
</div>

<!-- Event detail modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <h2 id="detailDate"></h2>
    <div id="detailBody"></div>
    <div class="modal-actions" id="detailActions"></div>
  </div>
</div>

<!-- Edit event modal -->
<div class="modal-backdrop" id="editModal">
  <div class="modal">
    <h2>Edit signup</h2>
    <p id="editPersonLabel" class="event-detail-meta" style="margin-bottom:1rem"></p>
    <form id="editForm" onsubmit="submitEdit(event)">
      <div class="form-group" style="margin-bottom:0.75rem">
        <label>Date *</label>
        <input type="date" id="edit_date" required />
      </div>
      <div class="form-group" style="margin-bottom:0.75rem">
        <label>Missionaries *</label>
        <select id="edit_missionary_type" required>
          <option value="elders">Elders</option>
          <option value="sisters">Sisters</option>
        </select>
      </div>
      <div class="form-group">
        <label>Notes for the missionaries (Optional)</label>
        <textarea id="edit_description" maxlength="200"></textarea>
      </div>
      <div id="editError" class="error-msg" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('editModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </div>
    </form>
  </div>
</div>

<!-- Contact us modal -->
<div class="modal-backdrop" id="contactModal">
  <div class="modal">
    <h2>Contact us</h2>
    <div class="info-body">
      <p>Contact details for the Brisbane Ward meal coordinator will be listed here.</p>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal('contactModal')">Close</button>
    </div>
  </div>
</div>

<!-- Privacy statement modal -->
<div class="modal-backdrop" id="privacyModal">
  <div class="modal">
    <h2>Privacy statement</h2>
    <div class="info-body">
      <p>The privacy statement for this site will be listed here.</p>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-ghost" onclick="closeModal('privacyModal')">Close</button>
    </div>
  </div>
</div>

<footer>
  <button type="button" class="footer-btn" onclick="openModal('contactModal')">Contact us</button>
  <button type="button" class="footer-btn" onclick="openModal('privacyModal')">Privacy statement</button>
</footer>

<div id="toast"></div>

</body>
</html>
