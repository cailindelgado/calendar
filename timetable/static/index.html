<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brisbane Ward -- Missionary Meal Roster</title>

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="/static/app.js" defer></script>
</head>
<body>

<header>
  <div>
    <h1>Missionary Meal Roster</h1>
    <p>Click any day to make an event</p>
  </div>
</header>

<main>
  <div class="type-toggle">
    <button id="toggleElders"  class="toggle-btn active-elders"  onclick="setType('elders')">Elders</button>
    <button id="toggleSisters" class="toggle-btn"                onclick="setType('sisters')">Sisters</button>
  </div>
  <div id="calendar"></div>
</main>

<!-- Sign-up modal -->
<div class="modal-backdrop" id="signupModal">
  <div class="modal">
    <h2 id="signupModalTitle">Sign up to bring a meal</h2>
    <form id="signupForm" onsubmit="submitSignup(event)">
      <div class="form-row">
        <div class="form-group">
          <label>First name *</label>
          <input type="text" id="f_name" required />
        </div>
        <div class="form-group">
          <label>Middle name</label>
          <input type="text" id="m_name" />
        </div>
        <div class="form-group">
          <label>Last name *</label>
          <input type="text" id="l_name" required />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0.75rem">
        <label>Phone number *</label>
        <input type="tel" id="phone_num" placeholder="e.g. 0412 345 678" pattern="^\+?[\d\s\-\(\)]{7,12}$" title="7–12 digits, spaces, hyphens, or parentheses" required />
      </div>
      <div class="form-group">
        <label>Notes for the missionaries (Optional)</label>
        <textarea id="description" maxlength="200"></textarea>
      </div>
      <div id="signupError" class="error-msg" style="display:none"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal('signupModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Sign me up</button>
      </div>
    </form>
  </div>
</div>

<!-- Event detail modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <h2 id="detailDate"></h2>
    <div id="detailBody"></div>
    <div class="modal-actions" id="detailActions"></div>
  </div>
</div>

<div id="toast"></div>

</body>
</html>
